name: Generate Snake

on:
  # Her gece saat 00:00'da otomatik çalışır
  schedule:
    - cron: "0 0 * * *" 
  # Manuel olarak tetiklemene izin verir
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dosyayı repoya yazabilmesi için izin

    steps:
      - uses: actions/checkout@v3

      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Hem açık hem karanlık tema için dosya üretir. 
          # Yılanın rengini senin o havalı yeşile (#50864c) ayarladım!
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#50864c

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output # Animasyonları 'output' adında gizli bir branch'e atar
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
